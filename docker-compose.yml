# Version explicite pour rester compatible avec l’exécutable « docker-compose » 1.x (VPS sans plugin Compose V2).
version: "3.8"

services:
  postgres:
    image: postgres:16-alpine
    container_name: kydopanel-postgres
    environment:
      POSTGRES_USER: kydopanel
      POSTGRES_PASSWORD: kydopanel
      POSTGRES_DB: kydopanel
    ports:
      - "5432:5432"
    volumes:
      - kydopanel_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kydopanel -d kydopanel"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  kydopanel_pg_data:
